<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>AR Memories — AR Camera</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #000;
      color: #fff; font-family: system-ui, sans-serif; z-index: 99999;
      gap: 16px;
    }
    #loading p { font-size: 14px; color: rgba(255,255,255,0.6); }
    .spinner {
      width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading AR Camera…</p>
  </div>

  <div id="ar-root"></div>

  <script>
    // Show loading until A-Frame is ready
    window.addEventListener('load', function() {
      setTimeout(function() {
        var l = document.getElementById('loading');
        if (l) l.style.display = 'none';
      }, 3000);
    });
  </script>

  <!-- A-Frame + AR.js loaded after DOM is ready -->
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.5.0/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>
  <script src="/ar-viewer-init.js"></script>
</body>
</html>
