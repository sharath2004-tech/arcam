services:
  - type: web
    name: arcam-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false   # Set manually in Render dashboard
      - key: MONGODB_DB_NAME
        value: arcam
      - key: ALLOWED_ORIGINS
        sync: false   # Set to your Vercel URL, e.g. https://your-app.vercel.app
